name: Magento CI
on: [push, pull_request]

jobs:
  phpstan:
    name: M2 PHPStan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: extdn/github-actions-m2/magento-phpstan/8.3@d759c634ddfba656d6732440ba178fac6425f919 # master
        with:
          composer_name: imagekit/imagekit-magento
          
  codestandard:
    name: M2 Coding Standard
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup PHP Action
        uses: shivammathur/setup-php@2.36.0
        with:
          php-version: 8.3
      - name: Install dependencies
        run: |
          composer global config allow-plugins.dealerdirect/phpcodesniffer-composer-installer true
          composer global require magento/magento-coding-standard:*
          composer install
      - name: PHPCS
        run: |
          ~/.composer/vendor/bin/phpcs --severity=9 --standard=Magento2 --ignore=*/vendor/* .
          
  package:
    name: M2 Zip Package
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - name: Prepare package directory
      run: |
        mkdir -p /tmp/package
        cp -r . /tmp/package/
        rm -rf /tmp/package/.git /tmp/package/.github /tmp/package/.devcontainer
    - uses: actions/upload-artifact@v4
      with:
          name: imagekit_imagekit-magento
          path: /tmp/package/
